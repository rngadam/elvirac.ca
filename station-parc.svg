      <rect x="604" y="465" width="80" height="150"/>
      <path d="M 604,503 h80 M 604,540 h80 M 604,577 h80 M 631,465 v150 M 657,465 v150"/>
      <rect x="604" y="635" width="80" height="125"/>
      <path d="M 604,665 h80 M 644,665 v95"/>
      <rect x="610" y="673" width="28" height="87"/>
      <rect x="650" y="673" width="28" height="87"/>

      <!-- Section 5 -->
      <rect x="748" y="465" width="80" height="150"/>
      <path d="M 748,503 h80 M 748,540 h80 M 748,577 h80 M 775,465 v150 M 801,465 v150"/>
      <rect x="748" y="635" width="80" height="125"/>
      <path d="M 748,665 h80 M 788,665 v95"/>
      <rect x="754" y="673" width="28" height="87"/>
