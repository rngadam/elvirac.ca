  <!-- Texte -->
  <text x="500" y="423" font-family="Montserrat, Helvetica, Arial, sans-serif" font-size="34" fill="#546e7a" text-anchor="middle" letter-spacing="10" font-weight="bold">PARC-EXTENSION</text>
</svg>
