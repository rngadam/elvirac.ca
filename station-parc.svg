      <path d="M 239,350 v-15 a 45,45 0 0 1 90,0 v15 Z"/>
      <path d="M 269,350 v-27 M 299,350 v-27"/>

      <path d="M 383,350 v-15 a 45,45 0 0 1 90,0 v15 Z"/>
      <path d="M 413,350 v-27 M 443,350 v-27"/>

      <path d="M 527,350 v-15 a 45,45 0 0 1 90,0 v15 Z"/>
      <path d="M 557,350 v-27 M 587,350 v-27"/>

      <path d="M 671,350 v-15 a 45,45 0 0 1 90,0 v15 Z"/>
      <path d="M 701,350 v-27 M 731,350 v-27"/>
    </g>

    <!-- Grilles de fenêtres et portes (5 sections) -->
    <g stroke-width="5">
      <!-- Section 1 -->
      <rect x="172" y="465" width="80" height="150"/>
      <path d="M 172,503 h80 M 172,540 h80 M 172,577 h80 M 199,465 v150 M 225,465 v150"/>
      <rect x="172" y="635" width="80" height="125"/>
      <path d="M 172,665 h80 M 212,665 v95"/>
      <rect x="178" y="673" width="28" height="87"/>
      <rect x="218" y="673" width="28" height="87"/>

