<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
  <!-- Cadre extérieur -->
  <rect x="25" y="25" width="950" height="950" rx="40" fill="white" stroke="#546e7a" stroke-width="15"/>
  
  <g fill="white" stroke="#546e7a" stroke-width="8" stroke-linejoin="round" stroke-linecap="round">
    
    <!-- Crochets latéraux (Brackets) -->
    <polygon points="150,220 90,220 60,250 30,250 30,265 70,265 100,235 150,235"/>
    <polygon points="850,220 910,220 940,250 970,250 970,265 930,265 900,235 850,235"/>

    <!-- Toit (Niveaux gradués) -->
    <rect x="330" y="160" width="340" height="25"/>
    <rect x="220" y="185" width="560" height="25"/>
    <rect x="150" y="210" width="700" height="30"/>
    <rect x="110" y="240" width="780" height="25"/>
    <rect x="90" y="265" width="820" height="35"/>

    <!-- Piliers extérieurs massifs -->
    <rect x="80" y="300" width="80" height="460"/>
    <rect x="75" y="300" width="90" height="25"/>
    <path d="M 80,340 h 80"/>
    <rect x="70" y="760" width="100" height="20"/>

    <rect x="840" y="300" width="80" height="460"/>
    <rect x="835" y="300" width="90" height="25"/>
