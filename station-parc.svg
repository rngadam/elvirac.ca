    <rect x="830" y="760" width="100" height="20"/>

    <!-- Bandeau principal et corniches -->
    <rect x="160" y="350" width="680" height="15"/>
    <rect x="155" y="365" width="690" height="15"/>
    <rect x="160" y="380" width="680" height="60"/>

    <!-- Colonnes intermédiaires (4 colonnes) -->
    <rect x="264" y="440" width="40" height="305"/>
    <rect x="259" y="440" width="50" height="15"/>
    <rect x="259" y="745" width="50" height="15"/>
    <rect x="254" y="760" width="60" height="20"/>

    <rect x="408" y="440" width="40" height="305"/>
    <rect x="403" y="440" width="50" height="15"/>
    <rect x="403" y="745" width="50" height="15"/>
    <rect x="398" y="760" width="60" height="20"/>

    <rect x="552" y="440" width="40" height="305"/>
    <rect x="547" y="440" width="50" height="15"/>
    <rect x="547" y="745" width="50" height="15"/>
    <rect x="542" y="760" width="60" height="20"/>

    <rect x="696" y="440" width="40" height="305"/>
    <rect x="691" y="440" width="50" height="15"/>
    <rect x="691" y="745" width="50" height="15"/>
    <rect x="686" y="760" width="60" height="20"/>

